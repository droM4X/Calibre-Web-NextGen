name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r optional-requirements.txt || true
          pip install -r requirements-dev.txt || true
      - name: Compile syntax check
        run: python -m compileall -q cps scripts
      - name: Smoke pytest (only files that don't need a live container)
        run: |
          if [ -d tests ]; then
            pytest tests -k "not docker" -q --maxfail=3 || \
              echo "::warning::pytest reported failures — review before merge"
          fi

  i18n-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install babel
        run: pip install babel
      - name: Validate every .po file compiles
        run: |
          set -e
          shopt -s globstar nullglob
          for po in cps/translations/**/*.po; do
            echo "→ $po"
            python -c "from babel.messages.pofile import read_po; read_po(open('$po','rb'))"
          done

  validate-author:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify all commits authored by new-usemame (or upstream credit)
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          BAD=$(git log --format='%H %ae' "$BASE..$HEAD" | grep -v '248195428+new-usemame@users.noreply.github.com' || true)
          if [ -n "$BAD" ]; then
            echo "::error::PR contains commits not authored by new-usemame:"
            echo "$BAD"
            echo
            echo "Re-author with: git rebase --reset-author <base> using"
            echo "  -c user.name='new-usemame' -c user.email='248195428+new-usemame@users.noreply.github.com'"
            exit 1
          fi
          echo "All commits authored by new-usemame ✓"
